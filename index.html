<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title> <!-- Title will be dynamically set to rootDomain -->
    <link rel="shortcut icon" href="/img/hns.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css?version=1">
</head>
<body>
    <div id="loading" style="display: none; text-align: center; padding-top: 150px; color: white;">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 1.2em; font-family: monospace;">Fetching TXT records from Handshake DNS...</p>
        <div style="margin-top: 40px; font-family: sans-serif;">
            <a href="https://directory.headlessprofile.com" target="_blank" style="display: inline-block; background: transparent; color: #00cc88; padding: 10px 20px; text-decoration: none; border-radius: 8px; border: 2px solid #00cc88; font-weight: bold;">
                While you wait, check out the cached directory ↗
            </a>
        </div>
    </div>
    <div id="content" style="display: none;">
        <div id="domain-header" style="text-align: center; padding: 20px 0; margin-bottom: 20px; font-family: monospace; font-size: 1.5em; color: #fff; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 15px 15px;">
            <!-- Domain name will be injected here -->
        </div>
        <div class="profile" id="profile"></div>
        <div class="links" id="links"></div>
        <div class="currency-buttons" id="currency-buttons"></div>
        <div id="directory-actions" style="text-align: center; margin-top: 20px;">
            <!-- Actions will be injected here via JS -->
        </div>
        <div style="text-align: center; margin-top: 40px; padding-bottom: 20px;">
            <div style="margin-bottom: 15px;">
                <a href="https://directory.headlessprofile.com" target="_blank" style="color:#0f0; text-decoration: none; font-weight: bold;">
                    → Browse All Agents in Directory
                </a>
            </div>
            <div style="margin-bottom: 40px;">
                <a href="https://headlessprofile.com" style="color:#0f0; text-decoration: none; font-weight: bold;">
                    → Search More In Headless Profile
                </a>
            </div>
            
            <!-- Credits Section -->
            <div style="font-size: 0.85em; opacity: 0.7; font-family: sans-serif; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; display: inline-block;">
                <p style="margin: 0 0 5px 0;">Powered by <a href="https://handshake.org" target="_blank" style="color: #fff; text-decoration: underline;">Handshake HNS</a></p>
                <p style="margin: 0;">Source code <a href="https://hns.bio" target="_blank" style="color: #fff; text-decoration: underline;">HNS.bio</a></p>
            </div>
        </div>
    </div>
    <script src="fetch.js"></script>
</body>
</html>
