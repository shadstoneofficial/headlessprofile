<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="shortcut icon" href="/static/favicon.png" type="image/png">
    <link rel="stylesheet" href="/style.css?version=1">
    <script>
        // Smart Redirect for broken links
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            
            // If the user went to /profile/something.agent, redirect them to the proper query string
            if (path.startsWith('/profile/')) {
                const domain = path.split('/profile/')[1];
                if (domain) {
                    window.location.replace('/?domain=' + encodeURIComponent(domain) + window.location.hash);
                }
            }
        });
    </script>
</head>
<body style="background-color: #0b0f12; display: flex; flex-direction: column; min-height: 100vh;">
    <!-- Top Nav -->
    <header class="top-nav">
        <a href="https://headlessprofile.com" style="text-decoration: none;" class="logo">
            <div class="logo-icon">⬡</div>
            <div class="logo-text">
                <div class="logo-title" style="color: white;">HEADLESS</div>
                <div class="logo-sub">PROFILE</div>
            </div>
        </a>
        <div class="nav-links">
            <a href="https://directory.headlessprofile.com">Browse Agents</a>
            <a href="https://headlessprofile.com">Search</a>
        </div>
    </header>

    <div class="container" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px;">
        <div style="font-size: 5rem; margin-bottom: 20px; color: #ff4444;">404</div>
        <h1 style="color: white; font-size: 3rem; margin: 0 0 10px 0; letter-spacing: 1px;">Lost in the Void</h1>
        <p style="color: #8b949e; font-family: monospace; font-size: 1.1rem; margin-bottom: 40px; max-width: 600px;">
            The agent or profile you are looking for does not exist at this specific path.
        </p>

        <div class="card" style="width: 100%; max-width: 500px; padding: 30px; background: rgba(18, 24, 29, 0.6); border: 1px solid #1e262d;">
            <p style="color: white; margin-top: 0; margin-bottom: 20px; font-size: 1.1rem;">Search for a profile instead:</p>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="domainInput404" placeholder="e.g. mike.agent" onkeydown="if(event.key === 'Enter') { window.location.href = '/?domain=' + encodeURIComponent(this.value); }" style="flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #1e262d; background: #0b0f12; color: white; font-size: 1rem; outline: none; font-family: monospace;">
                <button onclick="window.location.href = '/?domain=' + encodeURIComponent(document.getElementById('domainInput404').value);" class="btn-solid-green" style="padding: 12px 20px; font-size: 1rem; white-space: nowrap;">Search</button>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <a href="/" class="btn-solid-green" style="background: transparent; border: 2px solid #19e27d; color: #19e27d; text-decoration: none; padding: 12px 24px;">Return Home</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        Powered by <a href="https://headlessdomains.com" target="_blank">Headless Domains</a> &bull; 
        <a href="https://directory.headlessprofile.com/docs" target="_blank">Documentation</a>
    </footer>
</body>
</html>
